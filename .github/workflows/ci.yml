name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v5

      - name: 🏗️ Build Docker images
        run: docker compose build

      - name: 🚀 Start services
        run: docker compose up -d

      - name: ⏳ Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until docker compose logs backend 2>&1 | grep -q "Server is running"; do sleep 2; done'
          echo "Backend is ready!"
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until docker compose logs frontend 2>&1 | grep -q "ready in"; do sleep 2; done'
          echo "Frontend is ready!"

      - name: 🗄️ Push database schema
        run: docker compose exec -T backend npx drizzle-kit push --force

      - name: ✅ Run backend tests
        run: docker compose exec -T backend npm test -- run

      - name: ✅ Run frontend tests
        run: docker compose exec -T frontend npm test -- run

      - name: 📋 Show logs on failure
        if: failure()
        run: docker compose logs

      - name: 🧹 Cleanup
        if: always()
        run: docker compose down -v
