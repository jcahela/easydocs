name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until docker compose exec -T backend curl -f http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          timeout 60 bash -c 'until docker compose exec -T frontend curl -f http://localhost:5173 > /dev/null 2>&1; do sleep 2; done'

      - name: Run database migrations
        run: docker compose exec -T backend npm run db:migrate

      - name: Run backend tests
        run: docker compose exec -T backend npm test -- run

      - name: Run frontend tests
        run: docker compose exec -T frontend npm test -- run

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
